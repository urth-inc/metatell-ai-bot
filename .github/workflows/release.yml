name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Create & merge version PR
    if: ${{ github.ref_name == 'develop' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Changeset from commit subjects
        env:
          BUMP: ${{ inputs.bump }}
        run: node ./.github/scripts/create-changeset.mjs

      - name: Create version PR (Changesets)
        id: version_pr
        uses: changesets/action@v1
        with:
          version: node ./.github/scripts/version-with-root.mjs
          commit: "chore(release): Version Packages"
          title: "chore(release): Version Packages"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Find the version PR number
        id: find_pr
        shell: bash
        run: |
          # changesets/actionが作成したPRを最新のものから確実に取得
          # ブランチ名で特定（changeset-release/develop）することで一意性を保証
          PR_DATA=$(gh pr list --state open --base develop \
                    --head changeset-release/develop \
                    --json number,title,author,headRefName,createdAt \
                    --limit 1)
          
          if [ -z "$PR_DATA" ] || [ "$PR_DATA" == "[]" ]; then
            echo "No open version PR found. Either no changesets or action didn't create a PR."
            exit 1
          fi
          
          PR=$(echo "$PR_DATA" | jq -r '.[0].number')
          
          echo "Found PR #$PR (branch: changeset-release/develop)"
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (--merge)
        run: gh pr merge ${{ steps.find_pr.outputs.pr_number }} --auto --merge

      - name: Wait until the PR is merged (max 10 min)
        timeout-minutes: 10
        shell: bash
        run: |
          for i in $(seq 1 60); do
            STATE=$(gh pr view ${{ steps.find_pr.outputs.pr_number }} --json state,mergedAt --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged."
              exit 0
            fi
            echo "Waiting... (state=$STATE)"
            sleep 10
          done
          echo "Timed out waiting for PR merge."
          exit 1

      - name: Fetch latest develop after merge
        run: |
          echo "Fetching latest develop branch..."
          git fetch origin develop:develop --force
          echo "Latest develop commit: $(git rev-parse origin/develop)"

  publish:
    name: Publish via reusable workflow
    needs: release
    permissions:
      contents: write      # GitHub Release作成に必要
      id-token: write      # npm OIDC認証に必要
    uses: ./.github/workflows/publish.yml
    secrets: inherit
