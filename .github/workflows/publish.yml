name: Reusable Publish

on:
  workflow_call:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish packages (Changesets + npm OIDC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          
      - name: Pull latest changes
        run: |
          git pull origin develop
          echo "Publishing from commit: $(git rev-parse HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"

      - name: Setup Node from package.json (engines/volta)
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Compute pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/package.json') }}-node${{ hashFiles('package.json') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm & create GitHub Releases (via Changesets)
        uses: changesets/action@v1
        with:
          publish: pnpm release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: true
