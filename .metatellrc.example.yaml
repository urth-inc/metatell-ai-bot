# Example YAML configuration for Metatell AI Bot
# Rename to .metatellrc.yaml to use

url: https://metatell.app/your-room-id
token: '@.metatell-token'  # @ prefix reads from file

profile:
  displayName: My AI Bot
  avatarId: default-avatar

# Named profiles for different environments
profiles:
  development:
    url: https://metatell-dev.app/dev-room
    debug: true
    profile:
      displayName: Dev Bot

  production:
    url: https://metatell.app/prod-room
    botAccessKey: '@.bot-access-key'
    profile:
      displayName: Production Bot

# Rate limiting
rate:
  messagesPerSec: 2
  movesPerSec: 5
  looksPerSec: 10